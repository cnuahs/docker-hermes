# Docker compose for Hermes Agent (custom image)
#
# Usage:
#
#   To start hermes (interactive chat, or gateway daemon), fetching credentials
#   from Bitwarden Secrets Manager:
#
#   1. Set your Bitwarden Secrets Manager token in the environment:
#
#      export BWS_ACCESS_TOKEN=<token>
#
#   2. Then one of:
#
#      docker compose run --rm hermes                        interactive chat
#      docker compose run --rm hermes hermes --continue      continue last session
#      docker compose run --rm hermes hermes --resume <s>    resume session <s>
#
#      docker compose up -d gateway                          start gateway daemon

name: hermes-agent

services:
  hermes:
    image: ghcr.io/cnuahs/hermes-agent:latest
    container_name: hermes
    stdin_open: true
    tty: true
    volumes:
      - .hermes:/opt/data
    environment:
      - S6_KEEP_ENV=1
      - TZ=Australia/Melbourne
      - BWS_ACCESS_TOKEN=${BWS_ACCESS_TOKEN:-}
    entrypoint: ["/init", "/opt/hermes/docker/main-wrapper.sh", "bws", "run", "--"]
    command: ["hermes"]

  gateway:
    image: ghcr.io/cnuahs/hermes-agent:latest
    container_name: hermes-gateway
    restart: unless-stopped
    volumes:
      - .hermes:/opt/data
    environment:
      - S6_KEEP_ENV=1
      - TZ=Australia/Melbourne
      - BWS_ACCESS_TOKEN=${BWS_ACCESS_TOKEN:-}
    entrypoint: ["/init", "/opt/hermes/docker/main-wrapper.sh", "bws", "run", "--"]
    command: ["hermes", "gateway", "run"]
